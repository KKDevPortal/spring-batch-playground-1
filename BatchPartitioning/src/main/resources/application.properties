spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/springbatchplayground
spring.datasource.username=root
spring.datasource.password=Password

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

server.port=9191

spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false
spring.sql.init.mode=always

# Schema : https://github.com/spring-projects/spring-batch/blob/main/spring-batch-core/src/main/resources/org/springframework/batch/core/schema-mysql.sql